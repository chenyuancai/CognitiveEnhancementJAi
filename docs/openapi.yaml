  /api/app/learning/invoke:
    post:
      tags: [App Learning]
      summary: 调用学习 AI 能力
      description: mode=SCORING|TUTORING|QA，委托 Runtime 执行对应 Capability。
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppLearningInvokeRequest'
      responses:
        '200':
          description: 能力执行结果（与 Runtime 同步执行语义一致）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties: true
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantCodeHeader:
      name: X-Tenant-Code
      in: header
      required: false
      description: 租户编码，缺省为 default。
      schema:
        type: string
        default: default
    TraceIdHeader:
      name: X-Trace-Id
      in: header
      required: false
      description: 调用链路 ID；未传入时服务端生成并回传。
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        example: recordedAt,desc
    StartTime:
      name: startTime
      in: query
      required: false
      schema:
        type: string
        format: date-time
    EndTime:
      name: endTime
      in: query
      required: false
      schema:
        type: string
        format: date-time
  pathItems:
    MetadataCollection:
      get:
        tags: [Center Metadata]
        summary: 查询元数据列表
        parameters:
          - $ref: '#/components/parameters/TenantCodeHeader'
          - $ref: '#/components/parameters/TraceIdHeader'
          - $ref: '#/components/parameters/Page'
          - $ref: '#/components/parameters/Size'
          - $ref: '#/components/parameters/Sort'
          - name: keyword
            in: query
            required: false
            description: 模糊匹配资源编码和名称。
            schema:
              type: string
          - name: status
            in: query
            required: false
            schema:
              type: string
              enum: [ENABLED, DISABLED]
        responses:
          '200':
            description: 元数据分页列表
            content:
              application/json:
                schema:
                  allOf:
                    - $ref: '#/components/schemas/ApiResponse'
                    - type: object
                      properties:
                        data:
                          $ref: '#/components/schemas/CenterPageResult'
      post:
        tags: [Center Metadata]
        summary: 创建元数据
        parameters:
          - $ref: '#/components/parameters/TenantCodeHeader'
          - $ref: '#/components/parameters/TraceIdHeader'
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
        responses:
          '200':
            $ref: '#/components/responses/Success'
    MetadataItem:
      get:
        tags: [Center Metadata]
        summary: 查询元数据详情
        parameters:
          - $ref: '#/components/parameters/TenantCodeHeader'
          - $ref: '#/components/parameters/TraceIdHeader'
          - name: code
            in: path
            required: true
            schema:
              type: string
        responses:
          '200':
            $ref: '#/components/responses/Success'
      put:
        tags: [Center Metadata]
        summary: 更新元数据
        parameters:
          - $ref: '#/components/parameters/TenantCodeHeader'
          - $ref: '#/components/parameters/TraceIdHeader'
          - name: code
            in: path
            required: true
            schema:
              type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
        responses:
          '200':
            $ref: '#/components/responses/Success'
  responses:
    Success:
      description: 统一成功响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Error:
      description: 统一错误响应
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        data:
          nullable: true
        traceId:
          type: string
          nullable: true
    CenterPageResult:
      type: object
      properties:
        total:
          type: integer
          example: 42
        items:
          type: array
          items:
            type: object
        page:
          type: integer
          example: 1
        size:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 3
        hasNext:
          type: boolean
          example: true
    UserLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    UserRegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        displayName:
          type: string
        roleCodes:
          type: array
          items:
            type: string
    CapabilityExecuteRequest:
      type: object
      required: [capabilityCode, input]
      properties:
        capabilityCode:
          type: string
        input:
          type: object
          additionalProperties: true
        parameters:
          type: object
          additionalProperties: true
          description: |
            运行时扩展参数。ReAct 多轮 Tool：`reactEnabled`（默认 true）、`reactMaxIterations`（默认 5）。
    CapabilityExecutionStreamEvent:
      type: object
      properties:
        type:
          type: string
          enum: [STARTED, COMPLETED, FAILED]
        traceId:
          type: string
        capabilityCode:
          type: string
        success:
          type: boolean
        code:
          type: string
          example: A0400
        message:
          type: string
        data:
          nullable: true
    CapabilityLifecycleStatus:
      type: string
      enum: [DRAFT, PUBLISHED, OFFLINE]
    CapabilityResult:
      type: object
      properties:
        capabilityCode:
          type: string
        capabilityName:
          type: string
        capabilityDesc:
          type: string
        inputSchema:
          type: object
          nullable: true
        outputSchema:
          type: object
          nullable: true
        parameterConstraints:
          type: object
          additionalProperties: true
        executeMode:
          type: string
        boundAgentCode:
          type: string
        riskLevel:
          type: string
        needHumanConfirm:
          type: boolean
        status:
          type: string
          enum: [ENABLED, DISABLED]
        version:
          type: string
        lifecycleStatus:
          $ref: '#/components/schemas/CapabilityLifecycleStatus'
        publishedAt:
          type: string
          format: date-time
          nullable: true
    CapabilityDraftRequest:
      type: object
      properties:
        version:
          type: string
          description: 新版本号；为空时自动 patch 递增
        capabilityName:
          type: string
        capabilityDesc:
          type: string
        inputSchema:
          type: object
          nullable: true
        outputSchema:
          type: object
          nullable: true
        parameterConstraints:
          type: object
          additionalProperties: true
        executeMode:
          type: string
        boundAgentCode:
          type: string
        riskLevel:
          type: string
        needHumanConfirm:
          type: boolean
    CapabilityPublishRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
    CapabilityGrayRequest:
      type: object
      required: [grayRule]
      properties:
        grayRule:
          $ref: '#/components/schemas/PromptGrayRule'
    CapabilityReleasePointer:
      type: object
      properties:
        tenantCode:
          type: string
        capabilityCode:
          type: string
        baselineVersion:
          type: string
        candidateVersion:
          type: string
          nullable: true
        grayRule:
          $ref: '#/components/schemas/PromptGrayRule'
    CapabilityTenantBindingRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
    CapabilityTenantBinding:
      type: object
      properties:
        tenantCode:
          type: string
        capabilityCode:
          type: string
        enabled:
          type: boolean
    PromptLifecycleStatus:
      type: string
      enum: [DRAFT, PUBLISHED, OFFLINE]
    PromptResult:
      type: object
      properties:
        promptCode:
          type: string
        promptName:
          type: string
        scenarioCode:
          type: string
        version:
          type: string
        templateContent:
          type: string
        variableSchema:
          type: object
          nullable: true
        outputSchema:
          type: object
          nullable: true
        status:
          type: string
          enum: [ENABLED, DISABLED]
        lifecycleStatus:
          $ref: '#/components/schemas/PromptLifecycleStatus'
        publishedAt:
          type: string
          format: date-time
          nullable: true
    PromptDraftRequest:
      type: object
      properties:
        version:
          type: string
          description: 新版本号；为空时自动递增 patch
        promptName:
          type: string
        scenarioCode:
          type: string
        templateContent:
          type: string
        variableSchema:
          type: object
          nullable: true
        outputSchema:
          type: object
          nullable: true
    PromptPublishRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
    PromptOfflineRequest:
      type: object
      required: [version]
      properties:
        version:
          type: string
    PromptGrayRule:
      type: object
      properties:
        strategy:
          type: string
          default: PERCENTAGE
        baselineVersion:
          type: string
        candidateVersion:
          type: string
        percentage:
          type: integer
          minimum: 0
          maximum: 100
        hashKey:
          type: string
          default: traceId
    PromptGrayRequest:
      type: object
      required: [grayRule]
      properties:
        grayRule:
          $ref: '#/components/schemas/PromptGrayRule'
    PromptReleasePointer:
      type: object
      properties:
        tenantCode:
          type: string
        promptCode:
          type: string
        baselineVersion:
          type: string
        candidateVersion:
          type: string
          nullable: true
        grayRule:
          $ref: '#/components/schemas/PromptGrayRule'
    ToolDebugInvokeRequest:
      type: object
      required: [input]
      properties:
        input:
          description: Tool 输入，按 Tool requestSchema 校验
          nullable: true
        parameters:
          type: object
          additionalProperties: true
        traceId:
          type: string
          nullable: true
        debugConfirmed:
          type: boolean
          default: false
    ToolDebugInvokeResponse:
      type: object
      properties:
        traceId:
          type: string
        toolCode:
          type: string
          example: tool.search
        protocolType:
          type: string
          enum: [JAVA_LOCAL, HTTP, MCP]
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        mock:
          type: boolean
        latencyMs:
          type: integer
          format: int64
        invocationResult:
          $ref: '#/components/schemas/ToolInvocationResult'
    ToolInvocationResult:
      type: object
      properties:
        executorType:
          type: string
          example: TOOL
        toolCode:
          type: string
          example: tool.search
        protocolType:
          type: string
        permissionScope:
          type: string
        riskLevel:
          type: string
        input:
          nullable: true
        parameters:
          type: object
          additionalProperties: true
        toolPayload:
          nullable: true
        mock:
          type: boolean
    UsageAccount:
      type: object
      properties:
        tenantCode:
          type: string
          example: default
        balanceAmount:
          type: number
          format: double
          example: 99.999220
        usedAmount:
          type: number
          format: double
          example: 0.000780
        enabled:
          type: boolean
          example: true
        updatedAt:
          type: string
          format: date-time
    ModelGovernanceStateResult:
      type: object
      properties:
        tenantCode:
          type: string
        modelCode:
          type: string
        fallbackModelCode:
          type: string
          nullable: true
        circuitState:
          type: string
          enum: [CLOSED, OPEN, HALF_OPEN]
        consecutiveFailureCount:
          type: integer
        openedAt:
          type: string
          format: date-time
          nullable: true
    TraceSpanResult:
      type: object
      properties:
        tenantCode:
          type: string
        traceId:
          type: string
        spanId:
          type: string
        parentSpanId:
          type: string
          nullable: true
