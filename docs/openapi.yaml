  /api/app/billing/orders/pay:
    post:
      tags: [App Billing]
      summary: 发起支付（预下单）
      description: |
        返回渠道客户端调起参数 `clientParams`，订单保持 `PENDING`。
        支付成功后由渠道回调 `POST /api/app/billing/pay-callback` 触发履约。
        通道：`MOCK`（默认）/ `WECHAT` / `ALIPAY`。
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppPayOrderRequest'
      responses:
        '200':
          description: 预支付参数
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AppPayOrderResultVO'
  /api/app/billing/pay-callback:
    post:
      tags: [App Billing]
      summary: 支付结果回调
      description: |
        渠道服务器通知；网关白名单路径，无需 Bearer。
        - MOCK：`signature` 与 `cog.billing.pay-callback.mock-secret` 一致
        - WECHAT：需 `timestamp` + `nonce` + RSA 签名（V3 风格消息体）
        - ALIPAY：RSA2 排序串验签
      security: []
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: channel
          in: path
          required: true
          schema:
            type: string
            enum: [MOCK, WECHAT, ALIPAY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCallbackRequest'
      responses:
        '200':
          description: 履约后订单
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        description: OrderVO
                        additionalProperties: true
  /api/app/learning/modes:
    get:
      tags: [App Learning]
      summary: 可用学习模式
      description: 按会员权益返回 SCORING / TUTORING / QA 是否可用。
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
