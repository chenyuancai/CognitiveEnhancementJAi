openapi: 3.0.3
info:
  title: Cognitive Enhancement JAi Backend API
  version: 1.0.0
  description: |
    Cognitive Enhancement JAi 后端开放接口说明，覆盖鉴权、Center 元数据管理、
    Runtime 能力执行、观测、模型检查、Harness 治理、管理后台 CMS/工作台与 C 端 App 接口。
servers:
  - url: http://localhost:8801
    description: 本地开发环境（API 网关）
tags:
  - name: Auth
    description: 登录与注册
  - name: Users
    description: 用户管理
  - name: Center Metadata
    description: Center 元数据管理
  - name: Runtime
    description: Runtime 能力执行
  - name: Runtime Observations
    description: Runtime 观测与统计
  - name: Runtime Usage
    description: Runtime 用量与额度账户
  - name: Runtime Models
    description: 模型连通性与状态
  - name: Harness
    description: Agent Harness 治理验证
  - name: Admin CMS
    description: 管理后台 CMS（RBAC、会员、计费、内容、运营、系统）
  - name: Admin AI
    description: AI 控制台（成本看板、路由治理）
  - name: Admin Workbench
    description: 管理工作台看板（概览、趋势、待办）
  - name: App Auth
    description: C 端鉴权与注册
  - name: App Knowledge
    description: C 端知识内容与知识包目录
  - name: App Ops
    description: C 端运营投放（Banner、公告、站内信、客服工单）
  - name: App Billing
    description: C 端计费（套餐、下单、预支付、支付回调）
  - name: App Learning
    description: C 端学习链路（评分、带学、问答）
security:
  - bearerAuth: []
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: 登录并获取 JWT
      security: []
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/auth/register:
    post:
      tags: [Auth]
      summary: 注册用户并返回用户信息
      security: []
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/users:
    get:
      tags: [Users]
      summary: 分页查询用户列表
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/users/{id}:
    get:
      tags: [Users]
      summary: 查询用户详情
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/users/register:
    post:
      tags: [Users]
      summary: 管理端创建用户
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/users/login:
    post:
      tags: [Users]
      summary: 用户模块兼容登录入口
      security: []
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/capabilities/execute:
    post:
      tags: [Runtime]
      summary: 执行能力
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityExecuteRequest'
            examples:
              qa:
                value:
                  capabilityCode: capability.qa.answer
                  input:
                    question: 什么是 Cognitive Enhancement AI?
                  parameters:
                    temperature: 0.3
                    topP: 0.5
      responses:
        '200':
          description: 能力执行成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
  /api/runtime/capabilities/execute/stream:
    post:
      tags: [Runtime]
      summary: 以 SSE 事件流执行能力
      description: |
        返回 `text/event-stream`，事件类型包括 `STARTED`、`COMPLETED`、`FAILED`。
        当前接口复用同步执行链路，Trace、租户、限流、治理、观测和审计行为与
        `/api/runtime/capabilities/execute` 保持一致。执行失败时 HTTP 状态仍为 200，
        具体错误通过 `FAILED` 事件中的 `code`、`message` 和 `traceId` 传递。
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CapabilityExecuteRequest'
      responses:
        '200':
          description: SSE 执行事件流
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                success:
                  value: |
                    event: STARTED
                    data: {"type":"STARTED","traceId":"trace-001","capabilityCode":"capability.qa.answer","success":true,"code":"0","message":"能力执行已开始","data":null}

                    event: COMPLETED
                    data: {"type":"COMPLETED","traceId":"trace-001","capabilityCode":"capability.qa.answer","success":true,"code":"0","message":"成功","data":{}}
                failed:
                  value: |
                    event: STARTED
                    data: {"type":"STARTED","traceId":"trace-001","capabilityCode":"capability.qa.answer","success":true,"code":"0","message":"能力执行已开始","data":null}

                    event: FAILED
                    data: {"type":"FAILED","traceId":"trace-001","capabilityCode":"capability.qa.answer","success":false,"code":"A0400","message":"输入参数 question 必须是 string","data":null}
  /api/runtime/tools/debug-invoke:
    post:
      tags: [Runtime Tools]
      summary: 调试调用单个 Tool
      description: |
        管理台 Tool 调试入口。复用 ToolRuntime 的协议执行、Schema 校验、超时和重试逻辑，
        但不校验 Skill 绑定关系。HIGH 风险 Tool 需要 `debugConfirmed=true` 或
        请求头 `X-Debug-Confirmed: true`。
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: X-Debug-Confirmed
          in: header
          required: false
          schema:
            type: boolean
        - name: toolCode
          in: path
          required: true
          schema:
            type: string
          example: tool.search
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolDebugInvokeRequest'
            examples:
              local:
                value:
                  input:
                    question: Tool 调试是否可用?
                  parameters:
                    temperature: 0.2
      responses:
        '200':
          description: Tool 调试调用成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ToolDebugInvokeResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/runtime/observations/executions:
    get:
      tags: [Runtime Observations]
      summary: 分页查询执行记录
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
        - name: traceId
          in: query
          required: false
          schema:
            type: string
        - name: capabilityCode
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/observations/executions/{traceId}:
    get:
      tags: [Runtime Observations]
      summary: 查询执行链路详情
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: traceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/observations/usages:
    get:
      tags: [Runtime Observations]
      summary: 分页查询用量记录
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
        - name: executorType
          in: query
          required: false
          schema:
            type: string
            enum: [LLM, TOOL]
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/observations/model-checks:
    get:
      tags: [Runtime Observations]
      summary: 分页查询模型检查记录
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
        - name: modelCode
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/observations/model-checks/latest:
    get:
      tags: [Runtime Observations]
      summary: 查询指定模型最近一次检查记录
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: modelCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/observations/stats:
    get:
      tags: [Runtime Observations]
      summary: 查询观测聚合统计
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/observations/traces/{traceId}/spans:
    get:
      tags: [Runtime Observations]
      summary: 按 traceId 查询 Trace Span 步骤树
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: traceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trace Span 列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/TraceSpanResult'
        '404':
          $ref: '#/components/responses/Error'
  /api/runtime/observations/audit-logs:
    get:
      tags: [Runtime Observations]
      summary: 分页查询审计日志
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
        - name: traceId
          in: query
          required: false
          schema:
            type: string
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
        - name: resourceCode
          in: query
          required: false
          schema:
            type: string
        - name: success
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/sessions:
    post:
      tags: [Runtime Session]
      summary: 创建会话
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/sessions/{sessionId}:
    get:
      tags: [Runtime Session]
      summary: 查询会话详情
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/sessions/{sessionId}/messages:
    get:
      tags: [Runtime Session]
      summary: 查询会话消息列表
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/feedback:
    get:
      tags: [Runtime Feedback]
      summary: 查询执行反馈
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: traceId
          in: query
          required: false
          schema:
            type: string
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
    post:
      tags: [Runtime Feedback]
      summary: 提交执行反馈
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitFeedbackRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/knowledge/fragments:
    get:
      tags: [Runtime Knowledge]
      summary: 查询知识片段列表
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: knowledgeCode
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
    post:
      tags: [Runtime Knowledge]
      summary: 创建知识片段
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKnowledgeFragmentRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/knowledge/bindings:
    get:
      tags: [Runtime Knowledge]
      summary: 查询场景知识绑定列表
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: scenarioCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
    post:
      tags: [Runtime Knowledge]
      summary: 创建场景知识绑定
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScenarioBindingRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/knowledge/retrieve:
    get:
      tags: [Runtime Knowledge]
      summary: 检索知识片段
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: scenarioCode
          in: query
          required: true
          schema:
            type: string
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/files:
    post:
      tags: [Runtime File]
      summary: 注册文件上传元数据
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterFileUploadRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/files/{fileId}:
    get:
      tags: [Runtime File]
      summary: 查询文件上传记录
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/files/parse:
    post:
      tags: [Runtime File]
      summary: 启动文件解析
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/files/{fileId}/parse-result:
    get:
      tags: [Runtime File]
      summary: 查询最新文件解析结果
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/usage/account:
    get:
      tags: [Runtime Usage]
      summary: 查询当前租户用量额度账户
      description: |
        返回当前租户额度账户；账户不存在时服务端按默认额度自动创建。
        当额度账户启用后，能力执行前会检查余额，执行成功后按实际用量成本扣减余额。
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
        '200':
          description: 当前租户额度账户
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UsageAccount'
  /api/runtime/models/check:
    post:
      tags: [Runtime Models]
      summary: 执行模型连通性检查
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelConnectivityCheckRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/models/statuses:
    get:
      tags: [Runtime Models]
      summary: 查询模型状态列表
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/models/overview:
    get:
      tags: [Runtime Models]
      summary: 查询模型状态总览
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/runtime/models/governance:
    get:
      tags: [Runtime Models]
      summary: 查询模型治理状态（熔断/降级）
      description: |
        返回当前租户各模型的熔断状态、连续失败次数与降级目标。
        运行时 `DefaultModelGovernance` 在主模型熔断打开时自动路由到 `fallbackModelCode`。
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      responses:
        '200':
          description: 治理状态列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total:
                            type: integer
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/ModelGovernanceStateResult'
  /api/runtime/models/statuses/refresh:
    post:
      tags: [Runtime Models]
      summary: 刷新模型状态
      parameters:
        - $ref: '#/components/parameters/TenantCodeHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelStatusRefreshRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /api/admin/auth/me:
    get:
      tags: [Admin CMS]
