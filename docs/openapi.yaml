        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 结束日期（ISO-8601），缺省取今日
        - name: refresh
          in: query
          required: false
          schema:
            type: boolean
          description: 为 true 时绕过 60s 缓存强制重算
