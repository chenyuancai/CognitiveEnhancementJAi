cog:
  admin:
    scheduling:
      enabled: false
  persistence:
    enabled: false
  seed:
    enabled: true
  jwt:
    auth-enabled: false

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    urls:
      - url: /v3/api-docs/base
        name: 基础服务
      - url: /v3/api-docs/sse
        name: SSE 推送
