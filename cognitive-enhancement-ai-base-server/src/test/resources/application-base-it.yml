spring:
  config:
    activate:
      on-profile: base-it
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:base_it;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/base-it-schema.sql
  flyway:
    enabled: false

cog:
  persistence:
    enabled: false
  file:
    disk:
      root-path: ${java.io.tmpdir}/cog-base-file-it
      max-file-size: 10485760
